services:

  # ── PHP-FPM Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: genuine_app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-genuine_solution}"
      DB_USERNAME: "${DB_USERNAME:-genuine}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - genuine_network

  # ── MySQL 8 ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: genuine_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-genuine_solution}"
      MYSQL_USER: "${DB_USERNAME:-genuine}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genuine_network

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: genuine_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - genuine_network

# ── Volumes ──────────────────────────────────────────────────
volumes:
  db_data:
  app_storage:
  app_bootstrap_cache:

# ── Networks ─────────────────────────────────────────────────
networks:
  genuine_network:
    driver: bridge
